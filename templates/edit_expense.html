{% extends "base.html" %}

{% block content %}

<div class="auth-card">
    <h1>Edit Expense</h1>
    <p class="subtitle">Update expense details for {{ group["group_name"] }}.</p>

    <form method="POST">
        <label>Expense Title</label>
        <input type="text" name="title" value="{{ expense['title'] }}" required>

        <label>Amount</label>
        <input type="number" name="amount" step="0.01" min="0.01" value="{{ expense['amount'] }}" required>

        <label>Paid By</label>
        <select name="paid_by" required>
            {% for member in members %}
                <option value="{{ member['member_name'] }}"
                    {% if member['member_name'] == expense['paid_by'] %}selected{% endif %}>
                    {{ member["member_name"] }}
                </option>
            {% endfor %}
        </select>

        <label>Expense Date</label>
        <input type="date" name="expense_date" value="{{ expense['expense_date'] }}" required>

        <label>Notes</label>
        <textarea name="notes">{{ expense["notes"] }}</textarea>

        <button type="submit">Update Expense</button>
    </form>

    <p class="small-text">
        <a href="{{ url_for('group_details', group_id=group['id']) }}">Back to Group</a>
    </p>
</div>

{% endblock %}
